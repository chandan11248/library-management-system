{% extends "library/base.html" %}

{% block title %}Delete "{{ book.title }}" - Library Management System{% endblock %}

{% block content %}
<div class="container mt-4">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card p-4 text-center">
                <i class="fas fa-exclamation-triangle fa-3x text-danger mb-3"></i>
                <h3>Confirm Deletion</h3>
                <p class="lead">Are you sure you want to delete:</p>
                <h4 class="text-primary">"{{ book.title }}"</h4>
                <p class="text-muted">by {{ book.author }}</p>
                <hr>
                <form method="POST">
                    {% csrf_token %}
                    <div class="d-flex justify-content-center gap-3">
                        <button type="submit" class="btn btn-danger"><i class="fas fa-trash me-1"></i>Yes, Delete</button>
                        <a href="{% url 'book_detail' book.pk %}" class="btn btn-outline-secondary">Cancel</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
